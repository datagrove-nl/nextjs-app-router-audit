name: audit

on:
  push:
    branches: [main]
  pull_request:

jobs:
  self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Smoke-test the scanner against the bundled fixture so a broken
      # release never ships. --json keeps the output machine-checkable.
      - name: Run scanner on fixture
        run: node scripts/audit.mjs examples/fixture --json
